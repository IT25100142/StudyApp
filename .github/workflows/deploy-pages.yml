name: Deploy to GitHub Pages

on:
  push:
    branches: [V2, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -rf node_modules
          npm install --no-audit --no-fund 2>&1 | tee npm-install.log
          test -d node_modules/vite

      - name: Production build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          grep -q '/StudyApp/assets/' dist/index.html
          ! grep -q 'main.tsx' dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
